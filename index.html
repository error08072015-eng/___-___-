<!DOCTYPE html>
<html lang="ru">
<head>

<title>СЕРАЯ ПТИЦА</title>

<style>

    background:#0b0b0b;

header{

}

    letter-spacing:8px;

}

    padding:14px 24px;

    color:white;

</div>

<div class="card">
<h2>Документы</h2>

<p>SP-8-017 — Активен</p>

<a class="button" href="#">
Открыть архив
</a>

</div>

<div class="card">

<h2>Предупреждение</h2>

</p>

</div>

</div>

</html>
